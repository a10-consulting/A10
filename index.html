<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A10 Consulting — Performance Engineering</title>
    <meta name="description" content="Strategic advisory and execution power for complex business environments.">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<nav id="nav">
    <div class="nav-container">
        <a href="#" class="logo">A10<span>Consulting</span></a>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#expertise">Expertise</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
</nav>

<main>
    <section class="hero">
        <div class="reveal">
            <span style="color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 12px;">A10 Strategy Group</span>
            <h1>Confidentiality by default. <br><em>Trust by design.</em></h1>
            <p style="font-size: 20px; color: var(--mid); max-width: 600px; margin-bottom: 40px;">Specialized execution and strategic advisory for high-stakes corporate environments.</p>
            <a href="#contact" style="background: var(--navy); color: white; padding: 16px 32px; text-decoration: none; border-radius: 50px; font-weight: 600;">Start Discussion</a>
        </div>
    </section>

    </main>

<footer>
    <div class="logo" style="color: white; font-size: 32px;">A10<span style="color: rgba(255,255,255,0.4)">Consulting</span></div>
    <p class="footer-copy">© 2026 A10 Consulting Group. All rights reserved.</p>
</footer>

<script>
    // Scroll effect for navigation
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
    });

    // Reveal animation on scroll
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
